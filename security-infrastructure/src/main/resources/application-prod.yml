# prod environment: datasource fully driven by env vars (no insecure defaults). Flyway runs migrations
# on startup. Secure cookies stay on (RefreshCookies default).
datasources:
  default:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    dialect: POSTGRES
flyway:
  datasources:
    default:
      enabled: true
