micronaut:
  application:
    name: security-service
  metrics:
    enabled: true
    export:
      prometheus:
        enabled: true
        descriptions: true
        step: PT10S
  server:
    cors:
      enabled: true
      configurations:
        # the meme gallery UI (served by microservice-memes) signs users in against this service;
        # 4200 is security's own UI on its dev server (the specs' third entry point); 8093 is the
        # collections UI (react-native-web — its separate origin is what exercises CORS) and 5173
        # its Vite dev server
        ui:
          allowed-origins:
            - http://localhost:8083
            - http://localhost:8084
            - http://localhost:4200
            - http://localhost:8093
            - http://localhost:5173
endpoints:
  health:
    enabled: true
    sensitive: false
  # scraped by the workspace's Prometheus (observability/prometheus.yml); metrics carry no
  # secrets — request timings, JVM vitals, connection pools
  prometheus:
    enabled: true
    sensitive: false
# Links carried by the verification / password-reset mails; the mails themselves travel as events
# (transactional outbox -> Kafka `mail-requests` -> microservice-email).
email-service:
  verify-link-base: ${VERIFY_LINK_BASE:`http://localhost:8080/verify-email?token=`}
  reset-link-base: ${RESET_LINK_BASE:`http://localhost:8080/reset-password?token=`}
kafka:
  bootstrap:
    servers: ${KAFKA_BOOTSTRAP_SERVERS:`localhost:9092`}
